name = "azeta-homes"
main = "worker/index.ts"
compatibility_date = "2024-03-27"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
binding = "ASSETS"

[build]
command = "npm run build"

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "azeta-homes-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# ── KV Namespace (Rate Limiting) ──
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# ── Public Variables ──
[vars]
FRONTEND_ORIGIN = "https://azeta-homes.pages.dev"
JWT_EXPIRY = "900"
REFRESH_TOKEN_EXPIRY = "604800"
ENVIRONMENT = "production"

# ── Secrets (set via CLI, never in this file) ──
# wrangler secret put JWT_SECRET
# wrangler secret put ADMIN_EMAIL
# wrangler secret put EMAIL_API_KEY
# wrangler secret put NOTIFICATION_EMAIL
